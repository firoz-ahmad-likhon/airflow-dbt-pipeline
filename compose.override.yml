x-airflow-common-dev: &airflow-common-dev
  build:
    context: .
    dockerfile: Dockerfile
    target: ${ENV:-dev}

x-dbt-common-env: &dbt-common-env
  DBT_POSTGRES_HOST: ${POSTGRES_HOST}
  DBT_POSTGRES_DBNAME: ${POSTGRES_DB}
  DBT_POSTGRES_USER: ${POSTGRES_USER}
  DBT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  DBT_POSTGRES_PORT: ${POSTGRES_PORT}
  DBT_POSTGRES_SCHEMA: ${DBT_POSTGRES_SCHEMA}
  DBT_THREADS: ${DBT_THREADS}

x-dbt-common-dev: &dbt-common-dev
  image: likh/dbt-pipeline:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: dbt/Dockerfile
  environment:
    <<: *dbt-common-env
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dbt:/app/dbt
  networks:
    - airflow-net

x-airflow-volumes: &airflow-volumes
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/tests:/opt/airflow/tests
    - ${AIRFLOW_PROJ_DIR:-.}/pytest.ini:/opt/airflow/pytest.ini

services:
  airflow-apiserver:
    <<: [*airflow-common-dev, *airflow-volumes]

  airflow-scheduler:
    <<: *airflow-common-dev

  airflow-dag-processor:
    <<: *airflow-common-dev

  airflow-worker:
    <<: *airflow-common-dev

  airflow-triggerer:
    <<: *airflow-common-dev

  airflow-init:
    <<: *airflow-common-dev

  airflow-cli:
    <<: [*airflow-common-dev, *airflow-volumes]

  flower:
    <<: *airflow-common-dev

  dbt-init:
    <<: *dbt-common-dev
    environment:
      <<: *dbt-common-env
      DBT_PROJECT_NAME: dbt
    command:
      - /bin/bash
      - -c
      - |
        if [ ! -f "/app/dbt/dbt_project.yml" ]; then
          echo "Initializing dbt project in /app/dbt with project name: $${DBT_PROJECT_NAME}"
          rm -rf /tmp/dbt-init
          mkdir -p /tmp/dbt-init
          cd /tmp/dbt-init
          dbt init --project-name "$${DBT_PROJECT_NAME}" --skip-profile-setup
          shopt -s dotglob
          mv "/tmp/dbt-init/$${DBT_PROJECT_NAME}"/* /app/dbt/
        else
          echo "dbt project already exists at /app/dbt"
        fi
        if [ ! -f /app/dbt/profiles.yml ]; then
          echo "Creating env-driven /app/dbt/profiles.yml"
          printf '%s\n' \
            'dbt:' \
            '  target: default' \
            '  outputs:' \
            '    default:' \
            '      type: postgres' \
            '      host: "{{ env_var('"'"'DBT_POSTGRES_HOST'"'"') }}"' \
            '      port: "{{ env_var('"'"'DBT_POSTGRES_PORT'"'"') | int }}"' \
            '      user: "{{ env_var('"'"'DBT_POSTGRES_USER'"'"') }}"' \
            '      password: "{{ env_var('"'"'DBT_POSTGRES_PASSWORD'"'"') }}"' \
            '      dbname: "{{ env_var('"'"'DBT_POSTGRES_DBNAME'"'"') }}"' \
            '      schema: "{{ env_var('"'"'DBT_POSTGRES_SCHEMA'"'"') }}"' \
            '      threads: "{{ env_var('"'"'DBT_THREADS'"'"', '"'"'4'"'"') | int }}"' \
            > /app/dbt/profiles.yml
        else
          echo "/app/dbt/profiles.yml already exists"
        fi
    restart: "no"

  dbt:
    <<: *dbt-common-dev
    depends_on:
      app-postgres:
        condition: service_healthy
      dbt-init:
        condition: service_completed_successfully
    command:
      - /bin/bash
      - -c
      - |
        dbt debug
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "dbt --version >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
